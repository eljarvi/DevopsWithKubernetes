apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: shared-pvc
      containers:
        - name: ping-pong
          image: elleniini/ping-pong:1.11
          volumeMounts:
            - name: shared
              mountPath: /shared