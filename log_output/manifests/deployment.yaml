apiVersion: apps/v1
kind: Deployment
metadata: 
  name: log-output-dep
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: shared-pvc
      containers:
        - name: log-output-reader
          image: elleniini/log-output-reader:1.11
          volumeMounts:
            - name: shared
              mountPath: /shared
        - name: log-output-writer
          image: elleniini/log-output-writer:1.11
          volumeMounts:
            - name: shared
              mountPath: /shared